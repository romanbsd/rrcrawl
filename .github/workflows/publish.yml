name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing (+ provenance)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing needs npm >= 11.5.1; setup-node ships an older one.
      - run: npm install -g npm@latest
      - run: npm ci
      # No NODE_AUTH_TOKEN: OIDC exchanges a short-lived token, and provenance
      # is attached automatically. prepublishOnly runs test+check; prepack builds.
      - run: npm publish --access public
